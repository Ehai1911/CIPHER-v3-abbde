<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER — Админ панель</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--surface:#0f1628;--surface2:#141d35;--surface3:#1a2540;
  --border:#1e2d4a;--border2:#243558;--text:#e2e8f5;--text2:#a8b4cc;--muted:#5b6b8a;
  --gold:#d4a843;--gold-l:#e8c87a;--gold-glow:rgba(212,168,67,.1);--gold-border:rgba(212,168,67,.22);
  --green:#34d399;--red:#f87171;--blue:#60a5fa;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:100%;max-width:380px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-icon{width:36px;height:36px;border-radius:9px;background:var(--gold-glow);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--gold)}
.login-brand{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.04em}
.login-sub{font-size:10px;color:var(--muted);margin-top:1px}
.login-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px}
.login-hint{font-size:12px;color:var(--text2);margin-bottom:24px}
.login-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.login-input{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:9px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;margin-bottom:16px}
.login-input:focus{border-color:var(--gold-border)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold-d,#b08830),var(--gold));border:none;border-radius:9px;color:#0a0e1a;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

/* DASHBOARD */
#dashboard{display:none;min-height:100vh;flex-direction:column}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-logo{display:flex;align-items:center;gap:10px}
.top-icon{width:30px;height:30px;border-radius:7px;background:var(--gold-glow);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:var(--gold)}
.top-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--gold)}
.top-badge{font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin-left:10px}
.top-logout{font-size:11px;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border2);border-radius:6px;transition:all .2s}
.top-logout:hover{color:var(--text);border-color:var(--border)}
.dash-body{flex:1;padding:28px;overflow-y:auto}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}

/* NICHES */
.section-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
.niches-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.niche-tag{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;display:flex;align-items:center;gap:6px}
.niche-count{font-size:10px;font-weight:700;color:var(--gold);background:var(--gold-glow);border-radius:4px;padding:1px 5px}

/* SEARCH + FILTER */
.table-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.search-input{flex:1;max-width:320px;padding:9px 13px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--gold-border)}
.search-input::placeholder{color:var(--muted)}
.refresh-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.count-badge{font-size:11px;color:var(--muted);margin-left:auto}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:11px 16px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.td-product{font-weight:600;color:var(--text);font-size:13px}
.td-area{color:var(--text2)}
.td-client{font-family:'Courier New',monospace;font-size:10px;color:var(--muted);background:var(--surface3);border-radius:4px;padding:2px 6px}
.td-geo{font-size:11px}
.td-count{font-weight:600;color:var(--gold)}
.td-date{font-size:11px;white-space:nowrap}
.td-price{font-size:11px;color:var(--text2)}
.empty-row td{text-align:center;padding:48px;color:var(--muted);font-size:13px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(10,14,26,.8);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top:2px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .dash-body{padding:16px}
  .top-bar{padding:0 16px}
}
@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr}
  th:nth-child(4),td:nth-child(4),
  th:nth-child(5),td:nth-child(5){display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-icon">N</div>
      <div>
        <div class="login-brand">NEUROVIA LABS</div>
        <div class="login-sub">CIPHER · Admin</div>
      </div>
    </div>
    <div class="login-title">Панель администратора</div>
    <div class="login-hint">Введи пароль чтобы войти</div>
    <div class="login-label">Пароль</div>
    <input type="password" class="login-input" id="pwdInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-logo">
      <div class="top-icon">N</div>
      <div class="top-name">CIPHER Admin</div>
      <span class="top-badge">Все клиенты</span>
    </div>
    <button class="top-logout" onclick="logout()">Выйти</button>
  </div>

  <div class="dash-body">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Всего анализов</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">за всё время</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Уникальных клиентов</div>
        <div class="stat-value" id="statClients">—</div>
        <div class="stat-sub">устройств</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Сегодня</div>
        <div class="stat-value" id="statToday">—</div>
        <div class="stat-sub">анализов за день</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Топ ниша</div>
        <div class="stat-value" style="font-size:16px;padding-top:4px" id="statTopNiche">—</div>
        <div class="stat-sub" id="statTopNicheSub"></div>
      </div>
    </div>

    <!-- TOP NICHES -->
    <div class="section-title">Популярные ниши</div>
    <div class="niches-row" id="nichesRow"></div>

    <!-- TABLE -->
    <div class="table-controls">
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск по продукту, нише, гео..." oninput="filterTable()">
      <button class="refresh-btn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Обновить
      </button>
      <span class="count-badge" id="countBadge"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Продукт / Клиент</th>
            <th>Ниша</th>
            <th>Geography</th>
            <th>Конкур.</th>
            <th>Цена</th>
            <th>Дата</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="6">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script>
let _token = null;
let _allRows = [];

// Восстанавливаем сессию
(function init() {
  const saved = sessionStorage.getItem('cipher_admin_token');
  if (saved) { _token = saved; showDashboard(); loadData(); }
})();

async function doLogin() {
  const pwd = document.getElementById('pwdInput').value.trim();
  const err = document.getElementById('loginErr');
  if (!pwd) { err.textContent = 'Введи пароль'; return; }
  err.textContent = '';
  setLoading(true);
  try {
    const resp = await fetch('/api/admin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'login', password: pwd })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) { err.textContent = data.error || 'Неверный пароль'; return; }
    _token = data.token;
    sessionStorage.setItem('cipher_admin_token', _token);
    showDashboard();
    loadData();
  } catch(e) {
    err.textContent = 'Ошибка соединения';
  } finally { setLoading(false); }
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
}

function logout() {
  sessionStorage.removeItem('cipher_admin_token');
  _token = null;
  _allRows = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

async function loadData() {
  setLoading(true);
  try {
    const resp = await fetch('/api/admin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'data', token: _token })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      if (resp.status === 401) { logout(); return; }
      renderEmpty('Ошибка загрузки: ' + (data.error || 'неизвестная ошибка'));
      return;
    }
    if (!data.supabaseReady) {
      renderEmpty('Supabase не подключён. Добавь SUPABASE_URL и SUPABASE_SERVICE_ROLE_KEY в Vercel env.');
      return;
    }
    _allRows = data.analyses || [];
    renderStats(data.stats || {});
    renderNiches(data.stats?.topNiches || []);
    renderTable(_allRows);
  } catch(e) {
    renderEmpty('Ошибка: ' + e.message);
  } finally { setLoading(false); }
}

function renderStats(stats) {
  document.getElementById('statTotal').textContent   = stats.total ?? '—';
  document.getElementById('statClients').textContent = stats.uniqueClients ?? '—';
  document.getElementById('statToday').textContent   = stats.todayCount ?? '—';
  const topNiches = stats.topNiches || [];
  if (topNiches.length) {
    const [name, count] = topNiches[0];
    document.getElementById('statTopNiche').textContent    = name.length > 22 ? name.slice(0, 22) + '…' : name;
    document.getElementById('statTopNicheSub').textContent = count + ' анализов';
  }
}

function renderNiches(niches) {
  const el = document.getElementById('nichesRow');
  if (!niches.length) { el.innerHTML = '<span style="font-size:12px;color:var(--muted)">Нет данных</span>'; return; }
  el.innerHTML = niches.map(([name, count]) =>
    `<div class="niche-tag">${name}<span class="niche-count">${count}</span></div>`
  ).join('');
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  document.getElementById('countBadge').textContent = rows.length + ' записей';
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Анализов пока нет</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(a => {
    const clientShort = (a.client_key || '').slice(-8);
    const geo = Array.isArray(a.geography) ? a.geography.join(', ') : (a.geography || '—');
    const date = a.created_at
      ? new Date(a.created_at).toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '—';
    return `<tr>
      <td>
        <div class="td-product">${esc(a.product || '—')}</div>
        <div style="margin-top:3px"><span class="td-client">${clientShort}</span></div>
      </td>
      <td class="td-area">${esc(a.area || '—')}</td>
      <td class="td-geo">${esc(geo)}</td>
      <td class="td-count">${a.competitor_count || 0}</td>
      <td class="td-price">${esc(a.price || '—')}</td>
      <td class="td-date">${date}</td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderTable(_allRows); return; }
  const filtered = _allRows.filter(a =>
    (a.product || '').toLowerCase().includes(q) ||
    (a.area || '').toLowerCase().includes(q) ||
    (Array.isArray(a.geography) ? a.geography.join(' ') : (a.geography || '')).toLowerCase().includes(q)
  );
  renderTable(filtered);
}

function renderEmpty(msg) {
  document.getElementById('tableBody').innerHTML = `<tr class="empty-row"><td colspan="6">${msg}</td></tr>`;
  document.getElementById('countBadge').textContent = '';
}

function setLoading(on) {
  document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
